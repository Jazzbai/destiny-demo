<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #E6EBF2;font-family:'Manrope',sans-serif">
  <div style="max-width:1240px;margin:0 auto;padding:0 32px;height:78px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="index.dc.html" style="display:flex;align-items:center;gap:13px;text-decoration:none">
      <span style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:11px;background:linear-gradient(150deg,#123a7a,#1f5fd6);box-shadow:0 6px 16px rgba(24,86,213,0.28)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 16.5h18M5.5 16.5l1.6-5.2A2.5 2.5 0 0 1 9.5 9.5h5a2.5 2.5 0 0 1 2.4 1.8l1.6 5.2M7 19.5v-3M17 19.5v-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7.5" cy="16.5" r="1.6" fill="#fff"/><circle cx="16.5" cy="16.5" r="1.6" fill="#fff"/></svg>
      </span>
      <span style="display:flex;flex-direction:column;line-height:1">
        <span style="font-family:'Archivo',sans-serif;font-weight:800;font-size:21px;letter-spacing:2px;color:#0A1B33">DESTINY</span>
        <span style="font-weight:600;font-size:9.5px;letter-spacing:2.8px;color:#5A6B82;margin-top:3px">EXECUTIVE TRANSPORTATION</span>
      </span>
    </a>
    <nav style="display:flex;align-items:center;gap:34px">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="4">
        <a href="{{ link.href }}" style="{{ link.style }}">{{ link.label }}</a>
      </sc-for>
    </nav>
    <div style="display:flex;align-items:center;gap:20px">
      <a href="tel:18005550199" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#0A1B33;font-weight:700;font-size:14.5px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6.5 4h3l1.5 4-2 1.5a11 11 0 0 0 5 5l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16 16 0 0 1 4.5 6.2 2 2 0 0 1 6.5 4Z" stroke="#1856c5" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span style="display:flex;flex-direction:column;line-height:1.15">1 (800) 555-0199</span>
      </a>
      <a href="contact.dc.html" style="background:#1856c5;color:#fff;font-weight:700;font-size:14.5px;text-decoration:none;padding:12px 22px;border-radius:10px;box-shadow:0 8px 20px rgba(24,86,197,0.28);white-space:nowrap" style-hover="background:#0f3f99;transform:translateY(-1px)">Get a Quote</a>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:78},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;fleet&quot;,&quot;services&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const base = "text-decoration:none;font-weight:600;font-size:15px;color:#3A4860;padding:6px 0;border-bottom:2px solid transparent;transition:color .15s";
    const on = "text-decoration:none;font-weight:700;font-size:15px;color:#0A1B33;padding:6px 0;border-bottom:2px solid #1856c5";
    const items = [
      { key: 'home', label: 'Home', href: 'index.dc.html' },
      { key: 'fleet', label: 'Our Fleet', href: 'fleet.dc.html' },
      { key: 'services', label: 'Services', href: 'services.dc.html' },
      { key: 'contact', label: 'Contact', href: 'contact.dc.html' },
    ];
    return {
      links: items.map(i => ({ label: i.label, href: i.href, style: i.key === active ? on : base })),
    };
  }
}
</script>
</body>
</html>
